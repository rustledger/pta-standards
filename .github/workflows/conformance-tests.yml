name: Conformance Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - '.github/workflows/conformance-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
  workflow_dispatch:

jobs:
  beancount-tests:
    name: Beancount v3 Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install beancount beanquery

      - name: Run conformance tests
        run: |
          cd tests/harness/runners/python
          python runner.py \
            --manifest ../../../beancount/v3/manifest.json \
            --format tap

      - name: Run tests (JSON output)
        run: |
          cd tests/harness/runners/python
          python runner.py \
            --manifest ../../../beancount/v3/manifest.json \
            --format json > results.json

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: beancount-results
          path: tests/harness/runners/python/results.json

  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate test case schemas
        run: |
          # Validate all tests.json files against schema (draft-07)
          errors=0
          for f in $(find tests -name "tests.json"); do
            echo "Validating $f..."
            if ! ajv validate \
              -s tests/harness/test-case.schema.json \
              -d "$f" \
              --spec=draft7 \
              -c ajv-formats; then
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors test file(s) failed schema validation"
            exit 1
          fi

      - name: Validate manifest schemas
        run: |
          # Validate all manifest.json files (draft-07)
          errors=0
          for f in $(find tests -name "manifest.json"); do
            echo "Validating $f..."
            if ! ajv validate \
              -s tests/harness/manifest.schema.json \
              -d "$f" \
              --spec=draft7 \
              -c ajv-formats; then
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors manifest file(s) failed schema validation"
            exit 1
          fi

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore reference/sources/beancount/docs

  check-links:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments '**/*.md' --exclude-path reference/sources/beancount/docs
          fail: true
