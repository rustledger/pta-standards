name: Conformance Tests

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      update_readme:
        description: 'Update README with results'
        type: boolean
        default: false
  workflow_call:

jobs:
  beancount-v3:
    name: Beancount v3 (Python)
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.parse.outputs.total }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
      base_passed: ${{ steps.parse.outputs.base_passed }}
      base_failed: ${{ steps.parse.outputs.base_failed }}
      addendum_passed: ${{ steps.parse.outputs.addendum_passed }}
      addendum_failed: ${{ steps.parse.outputs.addendum_failed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install beancount from main branch
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/beancount/beancount.git@master
          pip install git+https://github.com/beancount/beanquery.git@master

      - name: Get beancount version
        id: version
        run: |
          VERSION=$(python -c "import beancount; print(beancount.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Beancount version: $VERSION"

      - name: Run conformance tests
        id: tests
        run: |
          cd tests/harness/runners/python
          python runner.py --manifest ../../../beancount/v3/manifest.json --format json 2>runner_errors.txt | tee results.json || true
          if [ -s runner_errors.txt ]; then
            echo "Runner stderr:"
            cat runner_errors.txt
          fi

      - name: Parse test results
        id: parse
        run: |
          cd tests/harness/runners/python
          if [ -s results.json ]; then
            python -c "
          import json, glob
          from pathlib import Path

          # Load results
          with open('results.json') as f:
              data = json.load(f)

          # Build set of addendum test IDs from test definitions
          addendum_ids = set()
          for tf in glob.glob('../../../../tests/beancount/v3/**/tests.json', recursive=True):
              for t in json.load(open(tf)).get('tests', []):
                  if 'addendum' in t.get('tags', []):
                      addendum_ids.add(t['id'])

          # Split results
          base = {'passed': 0, 'failed': 0, 'skipped': 0}
          addendum = {'passed': 0, 'failed': 0, 'skipped': 0}
          for r in data['results']:
              bucket = addendum if r['id'] in addendum_ids else base
              if r['status'] == 'pass':
                  bucket['passed'] += 1
              elif r['status'] == 'fail':
                  bucket['failed'] += 1
              elif r['status'] == 'skip':
                  bucket['skipped'] += 1

          # Output totals
          s = data['summary']
          print(f\"total={s['total']}\")
          print(f\"passed={s['passed']}\")
          print(f\"failed={s['failed']}\")
          print(f\"skipped={s['skipped']}\")

          # Output base spec counts
          print(f\"base_passed={base['passed']}\")
          print(f\"base_failed={base['failed']}\")

          # Output addendum counts
          print(f\"addendum_passed={addendum['passed']}\")
          print(f\"addendum_failed={addendum['failed']}\")
          " >> $GITHUB_OUTPUT
          else
            echo "results.json is empty or missing"
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "base_passed=0" >> $GITHUB_OUTPUT
            echo "base_failed=0" >> $GITHUB_OUTPUT
            echo "addendum_passed=0" >> $GITHUB_OUTPUT
            echo "addendum_failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: results-beancount
          path: tests/harness/runners/python/results.json

      - name: Create summary
        run: |
          echo "## Python Beancount (v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Spec | Passed | Failed |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Beancount v3 | ${{ steps.parse.outputs.base_passed }} | ${{ steps.parse.outputs.base_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PTA Addendum | ${{ steps.parse.outputs.addendum_passed }} | ${{ steps.parse.outputs.addendum_failed }} |" >> $GITHUB_STEP_SUMMARY

  rustledger:
    name: Rustledger
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.parse.outputs.total }}
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
      base_passed: ${{ steps.parse.outputs.base_passed }}
      base_failed: ${{ steps.parse.outputs.base_failed }}
      addendum_passed: ${{ steps.parse.outputs.addendum_passed }}
      addendum_failed: ${{ steps.parse.outputs.addendum_failed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout rustledger
        uses: actions/checkout@v6
        with:
          repository: rustledger/rustledger
          path: rustledger
          ref: main

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get rustledger commit SHA
        id: rl-sha
        run: echo "sha=$(cd rustledger && git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rustledger
          cache-on-failure: true
          key: rl-${{ steps.rl-sha.outputs.sha }}

      - name: Build rustledger
        run: |
          cd rustledger
          cargo build --release

      - name: Get rustledger version
        id: version
        run: |
          VERSION=$(cd rustledger && cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(pkgs[0]['version'] if pkgs else 'unknown')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Rustledger version: $VERSION"

      - name: Set up Python for test runner
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install git+https://github.com/beancount/beancount.git@master
          pip install git+https://github.com/beancount/beanquery.git@master

      - name: Run conformance tests
        id: tests
        run: |
          cd tests/harness/runners/python
          export RLEDGER_BIN="${GITHUB_WORKSPACE}/rustledger/target/release/rledger"
          python runner.py --manifest ../../../beancount/v3/manifest.json --format json --impl rustledger 2>runner_errors.txt | tee results.json || true
          if [ -s runner_errors.txt ]; then
            echo "Runner stderr:"
            cat runner_errors.txt
          fi

      - name: Parse test results
        id: parse
        run: |
          cd tests/harness/runners/python
          if [ -s results.json ]; then
            python -c "
          import json, glob

          with open('results.json') as f:
              data = json.load(f)

          addendum_ids = set()
          for tf in glob.glob('../../../../tests/beancount/v3/**/tests.json', recursive=True):
              for t in json.load(open(tf)).get('tests', []):
                  if 'addendum' in t.get('tags', []):
                      addendum_ids.add(t['id'])

          base = {'passed': 0, 'failed': 0, 'skipped': 0}
          addendum = {'passed': 0, 'failed': 0, 'skipped': 0}
          for r in data['results']:
              bucket = addendum if r['id'] in addendum_ids else base
              if r['status'] == 'pass':
                  bucket['passed'] += 1
              elif r['status'] == 'fail':
                  bucket['failed'] += 1
              elif r['status'] == 'skip':
                  bucket['skipped'] += 1

          s = data['summary']
          print(f\"total={s['total']}\")
          print(f\"passed={s['passed']}\")
          print(f\"failed={s['failed']}\")
          print(f\"skipped={s['skipped']}\")
          print(f\"base_passed={base['passed']}\")
          print(f\"base_failed={base['failed']}\")
          print(f\"addendum_passed={addendum['passed']}\")
          print(f\"addendum_failed={addendum['failed']}\")
          " >> $GITHUB_OUTPUT
          else
            echo "results.json is empty or missing"
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "base_passed=0" >> $GITHUB_OUTPUT
            echo "base_failed=0" >> $GITHUB_OUTPUT
            echo "addendum_passed=0" >> $GITHUB_OUTPUT
            echo "addendum_failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-rustledger
          path: tests/harness/runners/python/results.json

      - name: Create summary
        run: |
          echo "## Rustledger (v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Spec | Passed | Failed |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Beancount v3 | ${{ steps.parse.outputs.base_passed }} | ${{ steps.parse.outputs.base_failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PTA Addendum | ${{ steps.parse.outputs.addendum_passed }} | ${{ steps.parse.outputs.addendum_failed }} |" >> $GITHUB_STEP_SUMMARY

  update-readme:
    name: Update README
    needs: [beancount-v3, rustledger]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.update_readme == 'true'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update README with results
        run: |
          python scripts/update_readme.py \
            --readme README.md \
            --beancount-version "${{ needs.beancount-v3.outputs.version }}" \
            --beancount-base-passed "${{ needs.beancount-v3.outputs.base_passed }}" \
            --beancount-base-failed "${{ needs.beancount-v3.outputs.base_failed }}" \
            --beancount-addendum-passed "${{ needs.beancount-v3.outputs.addendum_passed }}" \
            --beancount-addendum-failed "${{ needs.beancount-v3.outputs.addendum_failed }}" \
            --rustledger-version "${{ needs.rustledger.outputs.version }}" \
            --rustledger-base-passed "${{ needs.rustledger.outputs.base_passed }}" \
            --rustledger-base-failed "${{ needs.rustledger.outputs.base_failed }}" \
            --rustledger-addendum-passed "${{ needs.rustledger.outputs.addendum_passed }}" \
            --rustledger-addendum-failed "${{ needs.rustledger.outputs.addendum_failed }}"

      - name: Commit and push
        run: |
          git config user.name "rustledger-bot[bot]"
          git config user.email "rustledger-bot[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update conformance test results [skip ci]"
          git push

  validate-test-schemas:
    name: Validate Test Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate test files against schema
        run: |
          python -c "
          import json
          import jsonschema
          from pathlib import Path

          schema_path = Path('tests/harness/test-case.schema.json')
          with open(schema_path) as f:
              schema = json.load(f)

          test_files = list(Path('tests').rglob('tests.json'))
          errors = []

          for test_file in test_files:
              with open(test_file) as f:
                  try:
                      data = json.load(f)
                      for test in data.get('tests', []):
                          try:
                              jsonschema.validate(test, schema)
                          except jsonschema.ValidationError as e:
                              errors.append(f'{test_file}:{test.get(\"id\", \"unknown\")}: {e.message}')
                  except json.JSONDecodeError as e:
                      errors.append(f'{test_file}: Invalid JSON - {e}')

          if errors:
              print('Schema validation errors:')
              for err in errors:
                  print(f'  - {err}')
              exit(1)
          else:
              print(f'Validated {len(test_files)} test files successfully')
          "

      - name: Check test IDs are unique within each manifest
        run: python scripts/check_test_ids_unique.py
