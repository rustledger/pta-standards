name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check JSON syntax
        run: |
          find . -name '*.json' -type f | while read f; do
            python3 -m json.tool "$f" > /dev/null || echo "Invalid JSON: $f"
          done

      - name: Check for trailing whitespace
        run: |
          if grep -rn '[[:blank:]]$' --include='*.md' --include='*.json' .; then
            echo "::warning::Found trailing whitespace in some files"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/harness/runners/python/tests/ -v \
            --cov=tests/harness/runners/python \
            --cov-report=term-missing \
            --cov-report=html:coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage-html/

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  lint-python:
    name: Lint Python
    uses: ./.github/workflows/lint-python.yml

  check-links:
    name: Check Links
    uses: ./.github/workflows/check-links.yml
