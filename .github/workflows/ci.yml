name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check JSON syntax
        run: |
          find . -name '*.json' -type f | while read f; do
            python3 -m json.tool "$f" > /dev/null || echo "Invalid JSON: $f"
          done

      - name: Check for trailing whitespace
        run: |
          if grep -rn '[[:blank:]]$' --include='*.md' --include='*.json' .; then
            echo "::warning::Found trailing whitespace in some files"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Lint Results" >> $GITHUB_STEP_SUMMARY
          json_count=$(find . -name '*.json' -type f | wc -l)
          echo "- Checked **$json_count** JSON files for syntax" >> $GITHUB_STEP_SUMMARY
          echo "- Checked markdown and JSON files for trailing whitespace" >> $GITHUB_STEP_SUMMARY

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        continue-on-error: true
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore reference/sources/beancount/docs

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install git+https://github.com/beancount/beancount.git@master
          pip install git+https://github.com/beancount/beanquery.git@master

      - name: Run unit tests with coverage
        run: |
          pytest tests/harness/runners/python/tests/ -v \
            --cov=tests/harness/runners/python \
            --cov-report=term-missing \
            --cov-report=html:coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-html/

      - name: Summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report uploaded as artifact." >> $GITHUB_STEP_SUMMARY

  conformance-tests:
    name: Conformance Tests
    uses: ./.github/workflows/conformance-tests.yml

  lint-python:
    name: Lint Python
    uses: ./.github/workflows/lint-python.yml

  check-links:
    name: Check Links
    uses: ./.github/workflows/check-links.yml

  validate-schemas:
    name: Validate Schemas
    uses: ./.github/workflows/validate-schemas.yml

  validate-grammars:
    name: Validate Grammars
    uses: ./.github/workflows/validate-grammars.yml
